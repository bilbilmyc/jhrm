<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>江湖如梦 · 筑基 · 灵界云台</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6EDD8"/>
      <stop offset="0.65" stop-color="#D4C28E"/>
      <stop offset="1" stop-color="#BEAA77"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4B05A"/>
      <stop offset="1" stop-color="#8C6B22"/>
    </linearGradient>
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.6"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
    <filter id="mist" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- 远山（灵界浮空岛） -->
  <g filter="url(#ink)" opacity="0.55">
    <path d="M 0 700 L 300 580 L 540 660 L 780 540 L 1080 640 L 1320 540 L 1620 660 L 1920 600 L 1920 800 L 0 800 Z" fill="#3A5C78"/>
  </g>
  <g filter="url(#ink)" opacity="0.70">
    <path d="M 0 820 L 220 760 L 460 800 L 720 740 L 960 800 L 1200 740 L 1480 810 L 1740 770 L 1920 800 L 1920 880 L 0 880 Z" fill="#3E5C3B"/>
  </g>
  <g filter="url(#ink)" opacity="0.90">
    <path d="M 0 920 L 240 880 L 460 920 L 720 870 L 960 920 L 1200 870 L 1460 920 L 1720 880 L 1920 910 L 1920 1080 L 0 1080 Z" fill="#1A1410"/>
  </g>

  <!-- 浮空云台 + 莲池 + 灵草 -->
  <g filter="url(#ink)" opacity="0.95">
    <!-- 中央浮空云台（三层悬浮岛） -->
    <g transform="translate(960,640)">
      <!-- 底层 -->
      <path d="M -260 60 L -200 -10 L -120 -50 L 0 -70 L 120 -50 L 200 -10 L 260 60 L 200 100 L 120 110 L 0 100 L -120 110 L -200 100 Z" fill="#5C7A6E"/>
      <!-- 中层 -->
      <path d="M -200 0 L -150 -50 L -80 -80 L 0 -90 L 80 -80 L 150 -50 L 200 0 L 150 30 L 80 40 L 0 35 L -80 40 L -150 30 Z" fill="#3E5C3B"/>
      <!-- 顶层 -->
      <path d="M -130 -40 L -90 -70 L -40 -85 L 0 -90 L 40 -85 L 90 -70 L 130 -40 L 90 -20 L 40 -15 L 0 -20 L -40 -15 L -90 -20 Z" fill="#9BB897"/>
      <!-- 中央莲池 -->
      <ellipse cx="0" cy="-55" rx="60" ry="14" fill="#4A7AA8"/>
      <ellipse cx="0" cy="-55" rx="50" ry="10" fill="#7BB6CC" opacity="0.6"/>
      <!-- 池中莲花 -->
      <g transform="translate(0,-58)">
        <path d="M 0 0 L -10 -16 L 10 -16 Z" fill="#B03327"/>
        <path d="M 0 0 L -16 -10 L -16 10 Z" fill="#B03327" opacity="0.85"/>
        <path d="M 0 0 L 16 -10 L 16 10 Z" fill="#B03327" opacity="0.85"/>
        <circle cx="0" cy="0" r="4" fill="#D4B05A"/>
      </g>
    </g>

    <!-- 左侧灵草（茎叶三株） -->
    <g transform="translate(380,840)" fill="#3E5C3B">
      <path d="M 0 0 L 0 -120" stroke="#3E5C3B" stroke-width="3" fill="none"/>
      <path d="M 0 -60 Q -25 -75 -40 -110 Q -20 -90 0 -70 Z" fill="#3E5C3B"/>
      <path d="M 0 -90 Q 22 -100 38 -130 Q 18 -115 0 -100 Z" fill="#4E8A4A"/>
      <path d="M 0 -120 Q -22 -130 -38 -160 Q -18 -145 0 -130 Z" fill="#3E5C3B"/>
      <!-- 花朵 -->
      <circle cx="-38" cy="-160" r="8" fill="#9BB897"/>
      <circle cx="38" cy="-130" r="6" fill="#D4B05A"/>
      <circle cx="0" cy="-160" r="10" fill="#B6892C" opacity="0.9"/>
    </g>

    <!-- 右侧灵草 -->
    <g transform="translate(1540,840)" fill="#3E5C3B">
      <path d="M 0 0 L 0 -100" stroke="#3E5C3B" stroke-width="3" fill="none"/>
      <path d="M 0 -50 Q 22 -65 36 -95 Q 16 -80 0 -60 Z" fill="#4E8A4A"/>
      <path d="M 0 -75 Q -22 -85 -36 -115 Q -16 -100 0 -85 Z" fill="#3E5C3B"/>
      <path d="M 0 -100 Q 22 -110 36 -140 Q 16 -125 0 -110 Z" fill="#4E8A4A"/>
      <circle cx="36" cy="-140" r="9" fill="#9BB897"/>
      <circle cx="-36" cy="-115" r="6" fill="#D4B05A"/>
    </g>
  </g>

  <!-- 云气带 -->
  <rect x="0" y="660" width="1920" height="120" fill="#F6EDD8" opacity="0.20" filter="url(#mist)"/>

  <!-- 金边框 + 四角卷云 -->
  <rect x="40" y="40" width="1840" height="1000" fill="none" stroke="url(#goldEdge)" stroke-width="2.5"/>
  <g fill="none" stroke="url(#goldEdge)" stroke-width="2">
    <path d="M 40 100 Q 90 80 120 110 Q 140 130 110 145 Q 90 155 70 145 Q 55 130 60 110"/>
    <path d="M 1880 100 Q 1830 80 1800 110 Q 1780 130 1810 145 Q 1830 155 1850 145 Q 1865 130 1860 110"/>
    <path d="M 40 980 Q 90 1000 120 970 Q 140 950 110 935 Q 90 925 70 935 Q 55 950 60 970"/>
    <path d="M 1880 980 Q 1830 1000 1800 970 Q 1780 950 1810 935 Q 1830 925 1850 935 Q 1865 950 1860 970"/>
  </g>

  <!-- 标题 -->
  <text x="960" y="380" text-anchor="middle"
        font-family="'Songti SC','STSong','PingFang SC','Noto Serif CJK SC',serif"
        font-size="320" font-weight="700" fill="#3E5C3B" letter-spacing="40">筑 基</text>

  <text x="960" y="455" text-anchor="middle"
        font-family="'Songti SC','STSong','PingFang SC','Noto Serif CJK SC',serif"
        font-size="56" font-weight="400" fill="#3A2C1E" letter-spacing="16">江 湖 如 梦</text>

  <line x1="760" y1="478" x2="1160" y2="478" stroke="#B6892C" stroke-width="1"/>
  <text x="960" y="510" text-anchor="middle"
        font-family="'Songti SC','STSong','PingFang SC','Noto Serif CJK SC',serif"
        font-size="28" font-weight="400" fill="#5C5040" letter-spacing="6">灵 根 初 成  ·  草 木 有 灵</text>

  <!-- 道印 -->
  <g transform="translate(1750,930)">
    <rect x="-40" y="-40" width="80" height="80" fill="#B03327"/>
    <text x="0" y="22" text-anchor="middle"
          font-family="'Songti SC','STSong','PingFang SC','Noto Serif CJK SC',serif"
          font-size="64" font-weight="700" fill="#F6EDD8">道</text>
    <rect x="-44" y="-44" width="88" height="88" fill="none" stroke="#F6EDD8" stroke-width="2"/>
  </g>

  <text x="100" y="1010"
        font-family="'Songti SC','STSong','PingFang SC','Noto Serif CJK SC',serif"
        font-size="20" font-weight="400" fill="#B6892C" letter-spacing="3">JIANGHU RUMENG  ·  v1.0.0  ·  0 2 / 0 5</text>
</svg>