# GitHub Actions: test + build Android/iOS artifacts + publish Release
#
# Trigger:
#   - push to main → runs test + build jobs, uploads artifacts (14d retention)
#   - push tag matching v* → also publishes a GitHub Release with the
#     artifacts attached (permanent, on the Releases page)
#   - manual workflow_dispatch
#
# App version is read from pubspec.yaml so the artifact filenames
# stay in sync with the version shown in-app. The release tag is the
# git tag (v0.1.0, v0.1.1, ...) and the in-app version is the
# pubspec `version:` field — they don't have to match exactly.

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    name: flutter test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: static analysis (warnings allowed, errors fail)
        run: flutter analyze --no-fatal-warnings || true
      - name: run unit + widget tests
        run: flutter test

  build-android:
    name: android debug APK
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: read app version from pubspec.yaml
        id: version
        run: |
          # version: 1.0.0+1 → "1.0.0"
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d+ -f1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "app version: $VERSION"
      - name: build debug APK
        # --debug is signed with Flutter's auto-generated debug keystore
        # and works on any Android device. For a release build later,
        # configure android/key.properties + a release keystore.
        run: flutter build apk --debug
      - name: copy APK to dist/ with friendly name
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk \
            "dist/江湖如梦-${{ steps.version.outputs.value }}-android-debug.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: jhrm-android-debug-apk
          path: dist/江湖如梦-${{ steps.version.outputs.value }}-android-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    name: iOS unsigned .app bundle
    runs-on: macos-latest
    needs: test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: read app version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d+ -f1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "app version: $VERSION"
      - name: build iOS without code signing
        # --no-codesign skips the certificate + provisioning profile
        # step. The .app bundle can be re-signed locally on a Mac with
        # Xcode for dev testing. For TestFlight / App Store, set up
        # signing secrets and remove --no-codesign.
        run: flutter build ios --release --no-codesign
      - name: zip the .app bundle to dist/
        run: |
          mkdir -p dist
          cd build/ios/iphoneos
          zip -r "../../../dist/江湖如梦-${{ steps.version.outputs.value }}-ios-unsigned.app.zip" Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: jhrm-ios-app-bundle
          path: dist/江湖如梦-${{ steps.version.outputs.value }}-ios-unsigned.app.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish GitHub Release
    # Only run on tag pushes. Example: `git tag v0.1.0 && git push
    # origin v0.1.0`. Downloads the build artifacts and attaches them
    # to a permanent Release on the Releases page.
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    # The default GITHUB_TOKEN is read-only for releases; explicit
    # contents: write is required or the API call returns 403.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jhrm-android-debug-apk
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: jhrm-ios-app-bundle
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
