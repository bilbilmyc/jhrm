# GitHub Actions: test + build Android/iOS artifacts + publish Release
#
# Trigger:
#   - push to main → runs test + build jobs, uploads artifacts (14d retention)
#   - push tag matching v* → also publishes a GitHub Release with the
#     artifacts attached (permanent, on the Releases page)
#   - manual workflow_dispatch
#
# App version is read from pubspec.yaml so the artifact filenames
# stay in sync with the version shown in-app. The release tag is the
# git tag (v0.1.0, v0.1.1, ...) and the in-app version is the
# pubspec `version:` field — they don't have to match exactly.
#
# Note on naming: GitHub's release asset `name` field silently strips
# non-ASCII characters. To preserve the friendly 江湖如梦 name on the
# release page, we use pinyin for the filename (jianghu-rumeng-...) and
# pass the Chinese name as the `label` (the display name shown in the
# release UI). The download URL is the pinyin file; once installed on
# the phone the app's display name comes from the manifest (currently
# "jhrm" — see android/app/src/main/AndroidManifest.xml).

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    name: flutter test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: static analysis (warnings allowed, errors fail)
        run: flutter analyze --no-fatal-warnings || true
      - name: run unit + widget tests
        run: flutter test

  build-android:
    name: android debug APK
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: read app version from pubspec.yaml
        id: version
        run: |
          # version: 1.0.0+1 → "1.0.0"
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d+ -f1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "app version: $VERSION"
      - name: build debug APK
        # --debug is signed with Flutter's auto-generated debug keystore
        # and works on any Android device. For a release build later,
        # configure android/key.properties + a release keystore.
        run: flutter build apk --debug
      - name: copy APK with friendly name (workspace root)
        # Upload path is a single-file relative path; the artifact zip
        # preserves whatever path is given. To make the release job's
        # download produce a clean `dist/jhrm-...` (not `dist/dist/...`),
        # we put the file at the workspace root, not under dist/.
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk \
            "jhrm-${{ steps.version.outputs.value }}-android-debug.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: jhrm-android-debug-apk
          path: jhrm-${{ steps.version.outputs.value }}-android-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    name: iOS unsigned .app bundle
    runs-on: macos-latest
    needs: test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: read app version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d+ -f1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "app version: $VERSION"
      - name: build iOS without code signing
        # --no-codesign skips the certificate + provisioning profile
        # step. The .app bundle can be re-signed locally on a Mac with
        # Xcode for dev testing. For TestFlight / App Store, set up
        # signing secrets and remove --no-codesign.
        run: flutter build ios --release --no-codesign
      - name: zip the .app bundle (workspace root)
        run: |
          cd build/ios/iphoneos
          zip -r "../../../jhrm-${{ steps.version.outputs.value }}-ios-unsigned.app.zip" Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: jhrm-ios-app-bundle
          path: jhrm-${{ steps.version.outputs.value }}-ios-unsigned.app.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish GitHub Release
    # Only run on tag pushes. Example: `git tag v0.1.0 && git push
    # origin v0.1.0`. Downloads the build artifacts and attaches them
    # to a permanent Release on the Releases page.
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    # The default GITHUB_TOKEN is read-only for releases; explicit
    # contents: write is required or the API call returns 403.
    permissions:
      contents: write
    steps:
      # Checkout is required so the version-reading step can grep
      # pubspec.yaml. The release job does not inherit checkout from
      # earlier jobs.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jhrm-android-debug-apk
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: jhrm-ios-app-bundle
          path: dist/
      - name: read app version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d+ -f1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
      - name: debug — list dist/ contents
        run: |
          echo "=== working dir ==="
          pwd
          echo "=== dist/ ==="
          ls -la dist/ 2>&1 || echo "dist/ does not exist"
          echo "=== find dist/ ==="
          find dist/ -type f 2>&1 || true
      # Build a `files:` list with `path#label` syntax. Path = pinyin
      # filename (ASCII only — GitHub strips non-ASCII from the
      # filename). Label = 江湖如梦 + version + platform tag (the
      # display name shown in the release UI).
      - name: build release file list
        id: filelist
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          {
            echo "files<<EOF"
            echo "dist/jhrm-${VERSION}-android-debug.apk#江湖如梦 ${VERSION} Android (debug)"
            echo "dist/jhrm-${VERSION}-ios-unsigned.app.zip#江湖如梦 ${VERSION} iOS (unsigned)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.filelist.outputs.files }}
